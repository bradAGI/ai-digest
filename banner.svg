<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#141428"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00aaff"/>
      <stop offset="100%" style="stop-color:#00ddff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.05" stroke="#00aaff">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>
  <!-- Dot -->
  <circle cx="480" cy="148" r="6" fill="#00ff88" opacity="0.9"/>
  <!-- Title -->
  <text x="505" y="160" font-family="monospace" font-size="72" font-weight="bold" fill="url(#cyan)">AI DIGEST</text>
  <!-- Subtitle -->
  <text x="505" y="210" font-family="monospace" font-size="22" fill="#6a6a8a">Daily AI news. No noise.</text>
  <!-- Email -->
  <text x="505" y="260" font-family="monospace" font-size="16" fill="#3a3a5a">aidigest@inkboxmail.com</text>
  <!-- Decorative brackets -->
  <text x="420" y="190" font-family="monospace" font-size="120" fill="#00aaff" opacity="0.08">{</text>
  <text x="1050" y="190" font-family="monospace" font-size="120" fill="#00aaff" opacity="0.08">}</text>
</svg>
